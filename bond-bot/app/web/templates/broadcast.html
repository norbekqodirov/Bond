<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Broadcast</title>
  </head>
  <body>
    <h2>Broadcast Post</h2>
    {% if sent %}<div style="color:green;">Sent (or attempted) to all users.</div>{% endif %}
    <form method="post" enctype="multipart/form-data">
      <label>Text<br/>
        <textarea name="text" rows="6" cols="80"></textarea>
      </label><br/>
      <label>Media (optional: jpg/png/mp4) <input type="file" name="media"></label><br/>
      <button type="submit">Send</button>
    </form>
    <p><a href="/admin">Back</a></p>
  </body>
</html>
